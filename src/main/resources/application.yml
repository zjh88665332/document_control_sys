server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: document-management
  datasource:
    url: jdbc:mysql://localhost:3306/document_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  sql:
    init:
      mode: never

app:
  jwt:
    secret: docmanage-jwt-secret-key-change-in-production-min-256-bits
    expiration-ms: 86400000
  file:
    upload-dir: ./uploads

logging:
  level:
    com.docmanage: DEBUG
